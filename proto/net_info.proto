syntax = "proto3";
package monitor;

message NetInfo {
    string iface         = 1;
    double rx_mbps       = 2;
    double tx_mbps       = 3;
    uint64 rx_packets    = 4;
    uint64 tx_packets    = 5;
    uint64 rx_dropped    = 6;
    uint64 tx_dropped    = 7;
    uint64 rx_errors     = 8;
    uint64 tx_errors     = 9;
}
